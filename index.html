<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derby Experience Concierge</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>Sign In</h2>
            <input type="text" id="loginUsername" placeholder="Username" autocomplete="off" />
            <input type="password" id="loginPassword" placeholder="Password" />
            <button onclick="handleLogin()">Log In</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <h1 class="title">
            Derby Experience Concierge
            <span>Your Personal Guide</span>
        </h1>
        <button class="restart-btn" onclick="window.botpress.restartConversation()">Restart Conversation</button>
    </div>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/11/12/21/20251112215246-NRTUFI5J.js" defer></script>

    <script>
      // On webchat ready: send only websiteUrl (no JWT yet)
      window.botpress.on('webchat:initialized', () => {
        const data = { websiteUrl: window.location.href };
        window.botpress.updateUser({ data });
        console.log('[Botpress] updateUser (pre-login) called with', data);
      });

      function handleLogin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        window.userJWT = 'eyJhbGciOiJIUzI1NiJ9.eyJlbWFpbCI6ImFzZGZhc2Rmb2V3aUB2bW9kbS5jb20iLCJleHAiOjE3NzQwMjYxMTB9.Il0w7IXYQ5rLVoYoU8D83oz7RXI4qqZLVvwqXv5HKRA';

        const data = { websiteUrl: window.location.href, jwt: window.userJWT };
        window.botpress.updateUser({ data });
        console.log('[Botpress] updateUser (post-login) called with', data);
      }
    </script>
</body>
</html>
