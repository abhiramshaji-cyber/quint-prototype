<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derby Experience Concierge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .title {
            text-align: center;
            color: #d4af37;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }

        .title span {
            display: block;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .restart-btn {
            display: block;
            margin: 2rem auto 0;
            padding: 0.75rem 2rem;
            background: #d4af37;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .restart-btn:hover {
            background: #c49b2f;
        }

        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-box h2 {
            color: #d4af37;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .login-box input {
            padding: 0.65rem 1rem;
            border-radius: 6px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .login-box input::placeholder {
            color: rgba(255,255,255,0.35);
        }

        .login-box button {
            padding: 0.7rem;
            background: #d4af37;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-box button:hover {
            background: #c49b2f;
        }

    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>Sign In</h2>
            <input type="text" id="loginUsername" placeholder="Username" autocomplete="off" />
            <input type="password" id="loginPassword" placeholder="Password" />
            <button onclick="handleLogin()">Log In</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <h1 class="title">
            Derby Experience Concierge
            <span>Your Personal Guide</span>
        </h1>
        <button class="restart-btn" onclick="window.botpress.restartConversation()">Restart Conversation</button>
    </div>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/11/12/21/20251112215246-NRTUFI5J.js" defer></script>

    <script>
      // On webchat ready: send only websiteUrl (no JWT yet)
      window.botpress.on('webchat:initialized', () => {
        const data = { websiteUrl: window.location.href };
        window.botpress.updateUser({ data });
        console.log('[Botpress] updateUser (pre-login) called with', data);
      });

      function handleLogin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        window.userJWT = 'eyJhbGciOiJIUzI1NiJ9.eyJlbWFpbCI6ImFzZGZhc2Rmb2V3aUB2bW9kbS5jb20iLCJleHAiOjE3NzQwMjYxMTB9.Il0w7IXYQ5rLVoYoU8D83oz7RXI4qqZLVvwqXv5HKRA';

        const data = { websiteUrl: window.location.href, jwt: window.userJWT };
        window.botpress.updateUser({ data });
        console.log('[Botpress] updateUser (post-login) called with', data);
      }
    </script>
</body>
</html>
